<!DOCTYPE html>
<html>

<head>
    <!-- The title shown at the top of the browser tab -->
    <title>The AJCE Archive</title>
    <!-- Makes the page look good on phones and computers -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Loads Bootstrap for basic layout building blocks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Our custom design choices -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="landing">

    <!-- Animated Statues -->
    <div class="landing-deco start-top">
        <img src="img/statue.png" alt="Statue">
    </div>
    <div class="landing-deco start-bottom">
        <img src="img/thinker.jpg" alt="Thinker">
    </div>

    <!-- Navigation bar at the top with premium glassmorphism -->
    <nav class="navbar">
        <div class="container d-flex align-items-center">
            <!-- Branding: Logo and Title wrapped in the Virtual Tour link -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="https://youtu.be/TN1XCXporTI?si=je1VvQR_Y2uNkbG3" target="_blank" title="Grand Virtual Tour of Ajce Library">
                <img src="img/collegelogo.jpg" alt="Grand Virtual Tour of Ajce Library" style="height: 40px; border-radius: 4px;">
                <span>The AJCE Archive</span>
            </a>
            <!-- This area dynamically shows 'Scholar Login' or 'Return to Login' -->
            <div id="nav-actions" class="ms-auto d-flex gap-3">
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="hero-content mx-auto text-center">
                <h1>Welcome to the AJCE Archive</h1>
                <p>"Where life’s quest begins and knowledge is preserved."</p>
                <a href="library.html" id="begin-exploration" class="cta-btn">Begin Exploration</a>
            </div>
        </div>
    </section>

    <footer>
        <p>@Ajce Management</p>
    </footer>

    <!-- Bootstrap logic for dropdowns and menus -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Our custom logic for the landing page entrance and exit motions -->
    <script src="js/landing.js"></script>
</body>

</html>
